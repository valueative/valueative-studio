<style>
:root{--black:#0b0d10;--ivory:#f7f4ee;--gold:#c8a45d;--mid:#8a8f98;--line:rgba(11,13,16,0.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Apple SD Gothic Neo","Pretendard","Noto Sans KR",sans-serif;background:var(--ivory);color:var(--black);-webkit-font-smoothing:antialiased}
.top{position:sticky;top:0;z-index:10;background:rgba(247,244,238,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.top-in{max-width:1120px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--black)}
.mark{width:38px;height:38px;border:1.5px solid var(--gold);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:22px;color:var(--gold)}
.brand b{font-size:15px;font-weight:700}.brand span{display:block;font-size:12px;color:var(--mid);letter-spacing:.1em}
.back{text-decoration:none;color:var(--mid);font-size:14px;font-weight:600}
.back:hover{color:var(--black)}
.hero{max-width:1120px;margin:0 auto;padding:44px 24px 20px}
.eyebrow{color:var(--gold);font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase}
.hero h1{font-size:34px;font-weight:800;letter-spacing:-.02em;margin:10px 0 8px}
.hero .cat{color:var(--mid);font-size:15px}
.note{max-width:1120px;margin:18px auto 0;padding:0 24px}
.note div{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 18px;font-size:14px;color:#4a4f57;display:flex;gap:10px;align-items:center}
.note b{color:var(--black)}
.grid{max-width:1120px;margin:26px auto 0;padding:0 24px 60px;display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.pg{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff;box-shadow:0 6px 20px rgba(11,13,16,.05)}
.pg img{width:100%;display:block}
.pgn{font-size:12px;color:var(--mid);padding:8px 12px;border-top:1px solid var(--line)}
.cta{position:fixed;right:22px;bottom:22px;z-index:20;background:#fae100;color:#3c1e1e;text-decoration:none;font-weight:800;font-size:15px;padding:14px 20px;border-radius:999px;box-shadow:0 10px 30px rgba(0,0,0,.18)}
.footer{background:var(--black);color:var(--ivory);text-align:center;padding:40px 24px}
.footer a{color:var(--gold);text-decoration:none;font-weight:700}
@media(max-width:720px){.grid{grid-template-columns:1fr}.hero h1{font-size:26px}}
</style>
</head>
