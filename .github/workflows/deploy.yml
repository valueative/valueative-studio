name: Deploy site to GitHub Pages

# 정본 소스는 src/ (CLAUDE.md 참조). src/ 를 그대로 Pages 아티팩트로 배포한다.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site (src/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./src
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
